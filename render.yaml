services:
  - type: web
    name: agent-magnet-http
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: MAGNET_DATABASE_URL
        sync: false
      - key: MAGNET_OPENAI_KEY
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: MAGNET_CORS_ORIGINS
        sync: false
      - key: MAGNET_ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: "8000"
